<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#0a0a0f"/>
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#9d174d"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>

  <!-- Back card (rose/pink) -->
  <g transform="translate(256,256) rotate(-8) scale(0.9)">
    <rect x="-150" y="-90" width="300" height="180" rx="30" fill="url(#g1)"/>
  </g>

  <!-- Middle card (blue/indigo) -->
  <g transform="translate(256,256) rotate(4) scale(0.95)">
    <rect x="-150" y="-90" width="300" height="180" rx="30" fill="url(#g2)"/>
  </g>

  <!-- Front card (violet/purple) -->
  <g transform="translate(256,256) rotate(-1)">
    <rect x="-150" y="-90" width="300" height="180" rx="30" fill="url(#g3)"/>
    <!-- Left swipe arrow -->
    <line x1="-20" y1="0" x2="-58" y2="0" stroke="rgba(255,255,255,0.6)" stroke-width="10" stroke-linecap="round"/>
    <polyline points="-44,-18 -58,0 -44,18" stroke="rgba(255,255,255,0.6)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Right swipe arrow -->
    <line x1="20" y1="0" x2="58" y2="0" stroke="rgba(255,255,255,0.6)" stroke-width="10" stroke-linecap="round"/>
    <polyline points="44,-18 58,0 44,18" stroke="rgba(255,255,255,0.6)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="7" fill="rgba(255,255,255,0.5)"/>
  </g>
</svg>
